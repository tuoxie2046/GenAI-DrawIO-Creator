name: Mark stale issues and PRs

on:
  schedule:
    - cron: '30 1 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          close-issue-message: This issue has been automatically closed because it has been stale for 60 days.
          close-pr-message: This PR has been automatically closed because it has been stale for 60 days.
